{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password Reset — Admin Xpermisions</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/base.css' %}">
</head>
<body class="bg-light d-flex align-items-center justify-content-center min-vh-100">
  <div class="card shadow" style="width: 420px;">
    <div class="card-body p-4">
      <h5 class="fw-bold mb-1">Reset Password</h5>
      <p class="text-muted small mb-3">Enter your email to receive reset instructions.</p>
      <form method="post">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label">Email address</label>
          <input type="email" name="email" class="form-control" required>
        </div>
        <div class="d-grid">
          <button type="submit" class="btn btn-primary">Send reset link</button>
        </div>
      </form>
      <div class="text-center mt-3">
        <a href="{% url 'accounts:login' %}" class="text-muted small">Back to login</a>
      </div>
    </div>
  </div>
</body>
</html>
