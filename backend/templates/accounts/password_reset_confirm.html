{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Set New Password — Admin Xpermisions</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center min-vh-100">
  <div class="card shadow" style="width: 420px;">
    <div class="card-body p-4">
      <h5 class="fw-bold mb-3">Set New Password</h5>
      {% if validlink %}
      <form method="post">
        {% csrf_token %}
        {% for field in form %}
        <div class="mb-3">
          <label class="form-label">{{ field.label }}</label>
          <input type="password" name="{{ field.html_name }}" class="form-control" required>
          {% if field.errors %}
          <div class="text-danger small">{{ field.errors.0 }}</div>
          {% endif %}
        </div>
        {% endfor %}
        <div class="d-grid">
          <button type="submit" class="btn btn-primary">Set Password</button>
        </div>
      </form>
      {% else %}
      <div class="alert alert-danger">This link is invalid or has expired.</div>
      <a href="{% url 'accounts:password_reset' %}" class="btn btn-outline-primary btn-sm">Request new link</a>
      {% endif %}
    </div>
  </div>
</body>
</html>
