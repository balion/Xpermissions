{% load static %}
<aside class="sidebar bg-white border-end shadow-sm" id="sidebar">
  <div class="sidebar-sticky pt-3">
    <ul class="nav flex-column px-2">
      <li class="nav-item">
        <a class="nav-link {% if request.resolver_match.app_name == 'dashboard' %}active{% endif %}"
           href="{% url 'dashboard:index' %}">
          <i class="bi bi-speedometer2 me-2"></i>Dashboard
        </a>
      </li>

      <li class="sidebar-divider mt-2 mb-1 px-2 text-muted small text-uppercase fw-semibold">
        Management
      </li>

      <li class="nav-item">
        <a class="nav-link {% if request.resolver_match.app_name == 'users' %}active{% endif %}"
           href="{% url 'users:list' %}">
          <i class="bi bi-people me-2"></i>Users
        </a>
      </li>

      <li class="nav-item">
        <a class="nav-link {% if request.resolver_match.app_name == 'roles' %}active{% endif %}"
           href="{% url 'roles:list' %}">
          <i class="bi bi-shield-check me-2"></i>Roles & Permissions
        </a>
      </li>

      <li class="nav-item">
        <a class="nav-link {% if request.resolver_match.app_name == 'projects' %}active{% endif %}"
           href="{% url 'projects:list' %}">
          <i class="bi bi-diagram-3 me-2"></i>Projects
        </a>
      </li>

      <li class="nav-item">
        <a class="nav-link {% if request.resolver_match.app_name == 'email_templates' %}active{% endif %}"
           href="{% url 'email_templates:list' %}">
          <i class="bi bi-envelope-paper me-2"></i>Email Templates
        </a>
      </li>

      {% if user_permissions.approvals.view %}
      <li class="nav-item">
        <a class="nav-link {% if request.resolver_match.app_name == 'approvals' %}active{% endif %}"
           href="{% url 'approvals:overview' %}">
          <i class="bi bi-check2-square me-2"></i>Approvals
        </a>
      </li>
      {% endif %}

      <li class="sidebar-divider mt-2 mb-1 px-2 text-muted small text-uppercase fw-semibold">
        System
      </li>

      <li class="nav-item">
        <a class="nav-link {% if request.resolver_match.app_name == 'audit' %}active{% endif %}"
           href="{% url 'audit:list' %}">
          <i class="bi bi-journal-text me-2"></i>Audit Log
        </a>
      </li>

      <li class="nav-item">
        <a class="nav-link" href="{% url 'swagger-ui' %}" target="_blank">
          <i class="bi bi-code-slash me-2"></i>API Docs
        </a>
      </li>
    </ul>
  </div>
</aside>
