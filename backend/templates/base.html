<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Admin Xpermisions{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  {% load static %}
  <link rel="stylesheet" href="{% static 'css/base.css' %}">
  <link rel="stylesheet" href="{% static 'css/layout/navbar.css' %}">
  <link rel="stylesheet" href="{% static 'css/layout/sidebar.css' %}">
  {% block extra_css %}{% endblock %}
</head>
<body class="bg-light">

{% include 'components/navbar.html' %}

<div class="d-flex" id="page-wrapper">
  {% include 'components/sidebar.html' %}

  <main class="main-content flex-grow-1 p-4" id="main-content">
    {% include 'components/alerts.html' %}
    {% block content %}{% endblock %}
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% load static %}
<script src="{% static 'js/base.js' %}"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
